<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <title>RAG - Analytics</title>
        <link rel="stylesheet" href="/static/css/style.css">
    </head>
    <body>

    <nav class="navbar">
        <div class="navbar-brand">Mini RAG</div>

        <div class="navbar-links">
            <a href="/">RAG</a>
            <a href="/embedding-page">Embedding</a>
            <a href="/analytics-page">Analytics</a>
        </div>
    </nav>

    <main class="page-container">

        <section class="page-header">
            <h1>Analytics</h1>
            <p>Analisi futura del vector database e degli embedding.</p>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <h2 id="documentsCount">-</h2>
                <p>Documenti</p>
            </div>

            <div class="stat-card">
                <h2 id="chunksCount">-</h2>
                <p>Chunk</p>
            </div>

            <div class="stat-card">
                <h2 id="vectorsCount">-</h2>
                <p>Vettori</p>
            </div>
        </section>

        <section class="card">
            <h2>Visualizzazioni future</h2>

            <ul class="analytics-list">
                <li>PCA 2D / 3D degli embedding</li>
                <li>t-SNE</li>
                <li>UMAP</li>
                <li>Distribuzione dei chunk per documento</li>
                <li>Documenti più interrogati</li>
            </ul>
        </section>

    </main>

    <script src="/static/js/common.js"></script>
    <script src="/static/js/analytics.js"></script>
    </body>
</html>
