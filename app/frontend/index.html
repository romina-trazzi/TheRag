<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <title>RAG - Query</title>
        <link rel="stylesheet" href="/static/css/style.css">
    </head>
    <body>

    <nav class="navbar">
        <div class="navbar-brand">THE RAG </div>

        <div class="navbar-links">
            <a href="/">RAG</a>
            <a href="/embedding-page">Embedding</a>
            <a href="/analytics-page">Analytics</a>
        </div>
    </nav>

    <main class="page-container">

        <section class="page-header">
            <h1>THE RAG </h1>
            <p>Fai una domanda alla knowledge base.</p>
        </section>

        <section class="card">
            <label for="questionInput">Domanda</label>

            <textarea 
                id="questionInput" 
                placeholder="Scrivi qui la tua domanda..."
                rows="6"></textarea>

            <button id="askButton">Chiedi</button>
        </section>

        <section class="card">
            <h2>Risposta</h2>
            <div id="loadingMessage" class="hidden">Sto generando una risposta...</div>
            <div id="answerBox" class="answer-box"></div>
        </section>

        <section class="card">
            <h2>Fonti recuperate</h2>
            <div id="sourcesBox" class="sources-box"></div>
        </section>

    </main>
     <script src="/static/js/common.js"></script>
    <script src="/static/js/rag.js"></script>
    </body>
</html>
